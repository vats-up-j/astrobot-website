name: Daily Horoscope Build

on:
  schedule:
    # Run at 22:00 UTC daily (03:30 IST approximately)
    - cron: '0 22 * * *'
  workflow_dispatch: {} # Manual trigger for testing

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Generate daily horoscope
        run: node scripts/generate-daily.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/daily-horoscope.json
          git diff --cached --quiet || git commit -m "chore: update daily horoscope $(date +%Y-%m-%d)"
          git push
